


<!DOCTYPE html>
<html>
<head>
<title>Library Chatbot</title>
<link rel="stylesheet" href="css/style.css">
<script src="js/chatbot.js"></script>
</head>

<body>

<header>
<h1>🤖 Library Chatbot</h1>
</header>

<div class="chatbox">

<input type="text" id="userInput" placeholder="Ask something...">

<button onclick="sendMessage()">Send</button>

<p id="chatResponse"></p>

</div>

<script src="js/chatbot.js"></script>
<script>
  window.watsonAssistantChatOptions = {
    integrationID: "faa89eb9-5e28-4d3f-8607-5da0960a322b", // The ID of this integration.
    region: "au-syd", // The region your integration is hosted in.
    serviceInstanceID: "75095f08-8cc7-4a7a-83b2-3043a63f1581", // The ID of your service instance.
    onLoad: async (instance) => { await instance.render(); }
  };
  setTimeout(function(){
    const t=document.createElement('script');
    t.src="https://web-chat.global.assistant.watson.appdomain.cloud/versions/" + (window.watsonAssistantChatOptions.clientVersion || 'latest') + "/WatsonAssistantChatEntry.js";
    document.head.appendChild(t);
  });
</script>
</body>
</html>
